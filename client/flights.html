<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>FlightOps Hub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="css/styles.css"
      rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

<div class="container-fluid">

    <a class="navbar-brand">
        FlightOps
    </a>

    <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainMenu">

        <span class="navbar-toggler-icon"></span>

    </button>

    <div
        class="collapse navbar-collapse"
        id="mainMenu">

        <div class="navbar-nav">

<a
   id="menuOperations"
   class="nav-link"
   href="flights.html">

   Operations

</a>

<a
   id="menuSchedules"
   class="nav-link"
   href="schedules.html">

   Schedules

</a>

<a
   id="menuStaff"
   class="nav-link"
   href="staff.html">

   Staff

</a>
           <div class="ms-auto d-flex align-items-center">

    <span
        class="text-white me-3"
        id="currentUserInfo">

    </span>

    <a
        class="nav-link text-white"
        href="#"
        onclick="logout()">

        Logout

    </a>

<a
   id="menuAbout"
   class="nav-link"
   href="about.html">

   About

</a>

</div>

        </div>

    </div>

</div>

</nav>

<div class="container py-3">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2 class="mb-0">
            Flights
        </h2>

        <div class="d-flex align-items-center">

            <div class="btn-group me-2">

                <button
                    class="btn btn-outline-secondary"
                    onclick="changeDate(-1)">

                    ◀ Yesterday

                </button>

                <button
                    class="btn btn-outline-primary"
                    onclick="goToday()">

                    Today

                </button>

                <button
                    class="btn btn-outline-secondary"
                    onclick="changeDate(1)">

                    Tomorrow ▶

                </button>

            </div>

            <input
                type="date"
                id="flightDate"
                class="form-control me-2"
                style="width:180px;">

            <button
                id="addFlightBtn"
                class="btn btn-warning"
                onclick="newFlight()">

                + Add Flight

            </button>

        </div>

    </div>

    <div
        id="flightSummary"
        class="d-flex align-items-center gap-4 mb-3">

    </div>

    <div id="flightContainer">

    </div>

</div>

    <div id="flightContainer">

    </div>

</div>


<div
    class="modal fade"
    id="flightModal"
    tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Add Flight

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="mb-2">

                    <label>Date</label>

                    <input
                        type="date"
                        class="form-control"
                        id="newFlightDate">

                </div>

                <div class="mb-2">

                    <label>Airline</label>

                    <input
                        class="form-control"
                        id="newAirline">

                </div>

                <div class="mb-2">

                    <label>Arrival Flight</label>

                    <input
                        class="form-control"
                        id="newArrivalFlight">

                </div>

                <div class="mb-2">

                    <label>Departure Flight</label>

                    <input
                        class="form-control"
                        id="newDepartureFlight">

                </div>

                <div class="mb-2">

                    <label>STA</label>

                    <input
                        type="time"
                        class="form-control"
                        id="newSta">

                </div>

                <div class="mb-2">

                    <label>STD</label>

                    <input
                        type="time"
                        class="form-control"
                        id="newStd">

                </div>

                <div class="mb-2">

                    <label>Aircraft Type</label>

                    <input
                        class="form-control"
                        id="newAircraftType">

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    class="btn btn-primary"
                    onclick="saveNewFlight()">

                    Save

                </button>

            </div>

        </div>

    </div>

</div>

<script src="js/common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/flights.js"></script>

</body>
</html>

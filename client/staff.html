<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Staff Administration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

<div class="container-fluid">

    <a class="navbar-brand">
        FlightOps
    </a>

    <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainMenu">

        <span class="navbar-toggler-icon"></span>

    </button>

    <div
        class="collapse navbar-collapse"
        id="mainMenu">

        <div class="navbar-nav">

 <a
   id="menuOperations"
   class="nav-link"
   href="flights.html">

   Operations

</a>

<a
   id="menuSchedules"
   class="nav-link"
   href="schedules.html">

   Schedules

</a>

<a
   id="menuStaff"
   class="nav-link"
   href="staff.html">

   Staff

</a>

<div class="ms-auto d-flex align-items-center">

    <span
        class="text-white me-3"
        id="currentUserInfo">

    </span>

    <a
        class="nav-link text-white"
        href="#"
        onclick="logout()">

        Logout

    </a>
<a
   id="menuAbout"
   class="nav-link"
   href="about.html">

   About

</a>
</div>
        </div>

    </div>

</div>

</nav>


<div class="container py-3">

    <h2>

        Staff Administration

    </h2>

    <button
        class="btn btn-primary mb-3"
        onclick="newUser()">

        Add Employee

    </button>

<div class="card mb-3">

    <div class="card-body">

        <div class="row">

            <div class="col-md-3">

                <input
                    type="text"
                    class="form-control"
                    id="searchUser"
                    placeholder="Search...">

            </div>

            <div class="col-md-2">

                <select
                    class="form-select"
                    id="filterDepartment">

                    <option value="">
                        All Departments
                    </option>

                    <option value="OPERATIONS">
                        Operations
                    </option>

                    <option value="PASSENGER_HANDLING">
                        Passenger Handling
                    </option>

                    <option value="RAMP">
                        Ramp
                    </option>

                    <option value="SPUR">
                        SPUR
                    </option>

                </select>

            </div>

            <div class="col-md-2">

                <select
                    class="form-select"
                    id="filterSkill">

                    <option value="">
                        All Skills
                    </option>

                    <option value="DISPATCH">
                        Dispatch
                    </option>

                    <option value="CHECKIN">
                        Check-In
                    </option>

                    <option value="GATE">
                        Gate
                    </option>

                    <option value="ARRIVAL">
                        Arrival
                    </option>

                    <option value="RAMP">
                        Ramp
                    </option>

                    <option value="SPUR">
                        SPUR
                    </option>

                </select>

            </div>

            <div class="col-md-2">

                <select
                    class="form-select"
                    id="filterStatus">

                    <option value="">
                        All Status
                    </option>

                    <option value="ACTIVE">
                        Active
                    </option>

                    <option value="DISABLED">
                        Disabled
                    </option>

                </select>

            </div>

            <div class="col-md-2">

                <select
                    class="form-select"
                    id="sortUsers">

                    <option value="NAME">
                        Name
                    </option>

                    <option value="DEPARTMENT">
                        Department
                    </option>

                    <option value="POSITION">
                        Position
                    </option>

                </select>

            </div>

        </div>

    </div>

</div>



    <div id="staffList">

    </div>

</div>

<div class="modal fade"
     id="userModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Employee

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input
                    type="hidden"
                    id="userId">

                <div class="mb-3">

                    <label>Name</label>

                    <input
                        class="form-control"
                        id="userName">

                </div>

                <div class="mb-3">

                    <label>Phone</label>

                    <input
                        class="form-control"
                        id="userPhone">

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        class="form-control"
                        id="userEmail">

                </div>

    <div class="mb-3">

    <label class="form-label">

        Department

    </label>

    <select
        class="form-select"
        id="userDepartment">

        <option value="OPERATIONS">
            Operations
        </option>

        <option value="PASSENGER_HANDLING">
            Passenger Handling
        </option>

        <option value="RAMP">
            Ramp Services
        </option>

        <option value="SPUR">
            SPUR
        </option>

    </select>

</div>

<div class="mb-3">

    <label class="form-label">

        Position

    </label>

    <select
        class="form-select"
        id="userPosition">

    </select>

</div>

<div class="mb-3">

    <label class="form-label">

        Skills

    </label>

    <div id="skillList">

    </div>

</div>

<div class="mb-3">

    <label class="form-label">

        Password

    </label>

    <input
        type="password"
        class="form-control"
        id="userPassword">

</div>

<div class="form-check">

    <input
        type="checkbox"
        class="form-check-input"
        id="userActive"
        checked>

    <label class="form-check-label">

        Active

    </label>

</div>

                <div>

                    <label>

                        Roles

                    </label>

                    <div
                        id="roleList">

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    class="btn btn-primary"
                    onclick="saveUser()">

                    Save

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/staff.js"></script>



</body>

</html>
